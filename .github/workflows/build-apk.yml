name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Verify APK exists
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIC-Survey-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: DIC Survey v1.0.${{ github.run_number }}
          body: |
            ## DIC Survey Android APK - Build ${{ github.run_number }}

            ### How to install
            1. Download app-debug.apk below
            2. Phone: Settings > Security > Allow unknown sources
            3. Open the APK file and tap Install
            4. Login with Officer ID and select district

            ### Features
            - DIC, Enterprise, Association, Stakeholder questionnaires
            - MIS Reports with charts and stats
            - Full offline mode, auto-sync to Supabase
            - All 33 Telangana districts
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

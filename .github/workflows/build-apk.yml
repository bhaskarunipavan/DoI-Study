name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DIC-Survey-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get APK size
        run: |
          echo "APK built successfully:"
          ls -lh app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: DIC-Survey-APK
          path: ./apk

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.sha_short }}
          name: "DIC Survey APK — ${{ steps.vars.outputs.sha_short }}"
          body: |
            ## DIC Survey App — Android APK

            **Auto-built from commit:** `${{ steps.vars.outputs.sha_short }}`

            ### How to install
            1. Download `app-debug.apk` below
            2. On your Android phone: Settings → Security → Enable "Install from unknown sources"
            3. Open the downloaded APK and install
            4. Login with your Officer ID and select your district

            ### Features
            - 4 questionnaire types: DIC, Enterprise, Association, Stakeholder
            - Fully offline — all responses saved locally on device
            - Auto-sync to Supabase when internet is available
            - All 33 Telangana districts pre-loaded
            - CSV export of all responses
          files: ./apk/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
